server {
    listen 80;
    server_name perryuan.xyz www.perryuan.xyz;

    # --- 前端静态文件 ---
    # 访问 / 时直接提供 Astro 构建出来的静态页面
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由 fallback：如果文件不存在就返回 index.html
    # （Astro 生成的是纯静态站点，这里主要是兜底）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- 后端 API 代理 ---
    # 所有 /api 开头的请求转发给后端代理服务
    location /api/ {
        proxy_pass http://fastgpt-proxy:8787;
        proxy_http_version 1.1;

        # SSE (Server-Sent Events) 支持 —— AI 聊天是流式返回的
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # 传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
